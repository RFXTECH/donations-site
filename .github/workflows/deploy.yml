name: Build and Push to GHCR

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # The repo name is RFXTECH/donations-site. We want the lowercase version for the tag.
  REPO_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase Image Name
        id: lowercase
        run: |
          # Convert the full repo name (e.g., RFXTECH/donations-site) to lowercase
          LOW_NAME=$(echo "${{ env.REPO_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "target_image=$LOW_NAME" >> $GITHUB_CACHED_OUTPUT || echo "target_image=$LOW_NAME" >> $GITHUB_OUTPUT
          # Note: Using a safer way to write to GITHUB_OUTPUT in case of shell differences
          echo "target_image=${LOW_NAME}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # We use the fully qualified ghcr.io/... tag to ensure it stays within the GHCR scope
          tags: ghcr.io/${{ steps.lowercase.outputs.target_image }}:latest
